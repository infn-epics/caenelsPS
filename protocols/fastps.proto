
OutTerminator = CR;
InTerminator = CR;

getModel {
    out "VER";
    in "#VER:%s\_%*s";
    @init  {
        out "VER";
        in "#VER:%s\_%*s"
    }
}

getLimits {
    separator=":";

    out "MLIMITS:?";
    in "#MLIMITS:%f";

    @init {
        out "MLIMITS:?";
        in "#MLIMITS:%f";
        # in "#MLIMITS:%(\$1Voltage.LOPR)f%(\$2Voltage.HOPR)f%(\$3Current.LOPR)f%(\$4Current.HOPR)f";
    }
}

getMinV {
    out "MLIMITS:?";
    in "#MLIMITS:%f:%*s";
}

getMaxV {
    out "MLIMITS:?";
    in "#MLIMITS:%*f:%f%*s";
}

getMinI {
    out "MLIMITS:?";
    in "#MLIMITS:%*f:%*f:%f%*s";
}

getMaxI {
    out "MLIMITS:?";
    in "#MLIMITS:%*f:%*f:%*f:%f";
}

getVersion {
    out "VER";
    in "#VER:%*s\_%*[^:]:%s";
    @init {
        out "VER";
        in "#VER:%*s\_%*[^:]:%s";
    };
}

################################################################################
# Basic commands
################################################################################

setEnable {
    out "%{MOFF|MON}";
    in "#AK";
}

setRegulationMode {
    out "LOOP:%{V|I}";
    in "#AK";
    @init {
        out "LOOP:?";
        in "#LOOP:%{V|I}";
    };
}

setUpdateMode {
    out "UPMODE:%{NORMAL|ANALOG}";
    in "#AK";
    @init {
        out "UPMODE:?";
        in "#UPMODE:%{NORMAL|ANALOG}";
    };
}

setFloatMode {
    out "SETFLOAT:%{N|F}";
    in "#AK";
    @init {
        out "SETFLOAT:?";
        in "#SETFLOAT:%{N|F}";
    };
}

# the commands are MWV (go to setpt without ramp) and MWVR (ramp)
setVoltage {
    out "MWV:%f";
    in "#AK";
}

setVoltageRamp {
    out "MWVR:%f";
    in "#AK";
}

# the commands are MWI (go to setpt without ramp) and MWIR (ramp)
setCurrent {
    out "MWI:%f";
    in "#AK";
}

setCurrentRamp {
    out "MWIR:%f";
    in "#AK";
}

resetStatus {
    out "MRESET";
    in "#AK";
}

################################################################################
# Slew rate commands (A/s and V/s)
################################################################################

setSlewRateI {
    out "MSRI:%f";
    in "#AK";
}

getSlewRateI {
    out "MSRI:?";
    in "#MSRI:%f";
    @init {
        out "MSRI:?";
        in "#MSRI:%f";
    };
}

setSlewRateV {
    out "MSRV:%f";
    in "#AK";
}

getSlewRateV {
    out "MSRV:?";
    in "#MSRV:%f";
    @init {
        out "MSRV:?";
        in "#MSRV:%f";
    };
}

################################################################################
# Setpoint readback
################################################################################

getSetpointI {
    out "MWI:?";
    in "#MWI:%f";
}

getSetpointV {
    out "MWV:?";
    in "#MWV:%f";
}

getRampSetpointI {
    out "MWIR:?";
    in "#MWIR:%f";
}

getRampSetpointV {
    out "MWVR:?";
    in "#MWVR:%f";
}

################################################################################
# Readback commands
################################################################################

getOutputVoltage {
    out "MRV";
    in "#MRV:%f";
}

getOutputCurrent {
    out "MRI";
    in "#MRI:%f";
}

getGroundCurrent {
    out "MGC";
    in "#MGC:%f";
}

getDCLinkVoltage {
    out "MRP";
    in "#MRP:%f";
}

getTemperature {
    out "MRT";
    in "#MRT:%f";
}

getOutputPower {
    out "MRW";
    in "#MRW:%f";
}

getModuleID {
    out "MRID";
    in "#MRID:%s";
    @init {
        out "MRID";
        in "#MRID:%s";
    };
}

################################################################################
# Status register
################################################################################

getStatusMSB {
    out "MST";
    in "#MST:%4x%*4x";
}

getStatusLSB {
    out "MST";
    in "#MST:%*4x%4x";
    @init {
        out "MST";
        in "#MST:%*4x%4x";
    }
}

################################################################################
# Solid state relay (MSIG / MSIGPU)
################################################################################

setSolidStateRelay {
    out "MSIG:%{0|1}";
    in "#AK";
    @init {
        out "MSIG:?";
        in "#MSIG:%{0|1}";
    };
}

setSolidStateRelayPU {
    out "MSIGPU:%d";
    in "#AK";
    @init {
        out "MSIGPU:?";
        in "#MSIGPU:%d";
    };
}

################################################################################
# Configuration commands (MRG/MWG)
################################################################################

getParamField {
    out "MRG:%(\$1.VAL)d";
    in "#MRG:%*d:%f";
}

setParamField {
    out "MWG:%(\$1.VAL)d:%f";
    in "#AK";
}

################################################################################
# Persistent switch (FAST-PS-1K5 only)
################################################################################

setPersistentSwitch {
    out "SETPS:%{0|1}";
    in "#AK";
}

################################################################################
# Memory save
################################################################################

saveParams {
    out "MSAVE";
    in "#AK";
}

################################################################################
# Hardware reset
################################################################################

hwReset {
    out "HWRESET";
    in "#AK";
}
